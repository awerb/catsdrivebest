const $=id=>document.getElementById(id);

function save(){try{localStorage.setItem('milaDMV',JSON.stringify({misses:s.misses,done:s.done,music:s.music}));}catch(e){}}
function load(){try{const d=JSON.parse(localStorage.getItem('milaDMV')||'{}');if(Array.isArray(d.misses))s.misses=d.misses;if(Array.isArray(d.done))s.done=d.done;if(typeof d.music==='boolean')s.music=d.music;}catch(e){}}

function questionsFor(level){if(level<4)return Q.slice(level*25,level*25+25).map((q,i)=>({q,id:level*25+i}));const seen=new Set(),out=[];s.misses.forEach(m=>{if(!seen.has(m.id)){seen.add(m.id);out.push({q:Q[m.id],id:m.id});}});return out;}
function startLevel(level){s.level=level;s.pos=0;s.sets=questionsFor(level);s.retry=false;s.current=null;$('hero').classList.add('hidden');if(level===4&&!s.sets.length){graduate('No missed questions. She crushed it.');return;}render();}
function render(){setActive('play');s.current=s.retry?s.current:s.sets[s.pos];const item=s.current;if(!item){finish();return;}const q=item.q;$('levelLabel').textContent=s.level<4?'Level '+(s.level+1):'Level 5 Boss';$('countLabel').textContent=(s.pos+1)+' / '+s.sets.length;$('bar').style.width=((s.pos/s.sets.length)*100)+'%';$('host').textContent=s.retry?'😼':['🐱','🐈','😺','😸','🐱‍👓'][s.level];$('question').textContent=q[0];$('answers').innerHTML='';$('feedback').classList.add('hidden');$('nextBtn').classList.add('hidden');q[1].forEach((txt,i)=>{const b=document.createElement('button');b.type='button';b.className='answer a'+i;b.innerHTML='<span class="bubble">'+String.fromCharCode(65+i)+'</span><span>'+txt+'</span>';b.addEventListener('click',()=>choose(i,b));$('answers').appendChild(b);});}
function choose(i,btn){const item=s.current,q=item.q,correct=q[2];document.querySelectorAll('.answer').forEach(b=>b.disabled=true);const fb=$('feedback');if(i===correct){btn.classList.add('correct');fb.innerHTML='<b>Correct ✨</b><br>'+q[3];s.retry=false;}else{btn.classList.add('wrong');document.querySelectorAll('.answer')[correct].classList.add('correct');fb.innerHTML='<b>Not quite 🐾</b><br>'+q[3]+'<br><br><b>Answer this one again before moving on.</b>';s.retry=true;s.misses.push({id:item.id,q:q[0],chosen:q[1][i],correct:q[1][correct],why:q[3],level:s.level+1});save();}fb.classList.remove('hidden');$('nextBtn').classList.remove('hidden');}
function next(){if(s.retry){render();return;}s.pos++;if(s.pos>=s.sets.length){finish();return;}render();}
function finish(){if(s.level<4)s.done[s.level]=true;save();celebrate();if(s.level===4){graduate('Mila beat the missed-question boss level.');return;}$('complete').innerHTML='<div class="big">Level Complete!</div><div class="bigcats">🎺🐱⭐</div><p class="big">Every question answered correctly.</p><button class="btn green" id="cont" type="button">Continue</button>';setActive('complete');$('cont').addEventListener('click',()=>startLevel(s.level<3?s.level+1:4));}
function graduate(msg){celebrate();$('complete').innerHTML='<div class="big">Graduated!</div><div class="bigcats">🐱🎓🎉🐱</div><p class="big">'+msg+'</p><button class="btn blue" id="again" type="button">Play Again</button>';setActive('complete');$('again').addEventListener('click',()=>startLevel(0));}
function levels(){const g=$('levelGrid');g.innerHTML='';for(let i=0;i<5;i++){const unlocked=i===0||i===4||s.done[i-1];const div=document.createElement('button');div.type='button';div.className='level '+(unlocked?'':'locked');const missCount=(new Set(s.misses.map(m=>m.id))).size;div.innerHTML='<div class="levelNum">'+(i+1)+'</div><b>'+(i<4?'Level '+(i+1):'Boss Level')+'</b><br><span class="small">'+(i<4?(s.done[i]?'✅ Complete':'25 questions'):(missCount+' missed'))+'</span>';div.addEventListener('click',()=>{if(unlocked)startLevel(i);});g.appendChild(div);}setActive('levels');}
function review(){const list=$('reviewList');list.innerHTML='';if(!s.misses.length)list.innerHTML='<p>No missed questions yet.</p>';[...s.misses].reverse().forEach(m=>{const d=document.createElement('div');d.className='reviewItem';d.innerHTML='<b>'+m.q+'</b><br>You chose: <b style="color:#e32675">'+m.chosen+'</b><br>Correct: <b style="color:#16a322">'+m.correct+'</b><br><span class="small">'+m.why+'</span>';list.appendChild(d);});setActive('review');}
function celebrate(){try{const c=$('confetti');c.innerHTML='';['🎉','🌸','⭐','🐱','🍬','💖'].forEach(()=>{});for(let i=0;i<70;i++){const el=document.createElement('i');el.textContent=['🎉','🌸','⭐','🐱','🍬','💖'][Math.floor(Math.random()*6)];el.style.left=Math.random()*100+'vw';el.style.animationDelay=Math.random()*1.3+'s';c.appendChild(el);}setTimeout(()=>c.innerHTML='',4000);}catch(e){}trumpet();}
function ensureAudio(){try{if(!s.ctx)s.ctx=new (window.AudioContext||window.webkitAudioContext)();if(!s.musicBus){s.musicBus=s.ctx.createGain();s.musicBus.gain.value=0;s.musicBus.connect(s.ctx.destination);}if(s.ctx.state==='suspended'){const r=s.ctx.resume();if(r&&r.catch)r.catch(()=>{});}return s.ctx;}catch(e){return null;}}
function playTone(ctx,freq,when,duration,type,peak,target){const o=ctx.createOscillator(),g=ctx.createGain();o.type=type;o.frequency.value=freq;o.connect(g);g.connect(target||ctx.destination);g.gain.setValueAtTime(.0001,when);g.gain.exponentialRampToValueAtTime(peak,when+.18);g.gain.exponentialRampToValueAtTime(Math.max(.0001,peak*.45),when+duration*.58);g.gain.exponentialRampToValueAtTime(.0001,when+duration);o.start(when);o.stop(when+duration+.04);}
function trumpet(){try{const ctx=s.ctx||new (window.AudioContext||window.webkitAudioContext)();[523,659,784,1046].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type='square';o.frequency.value=f;o.connect(g);g.connect(ctx.destination);g.gain.setValueAtTime(.001,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.08,ctx.currentTime+.03+i*.07);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.18+i*.07);o.start(ctx.currentTime+i*.07);o.stop(ctx.currentTime+.24+i*.07);});}catch(e){}}
function toggleMusic(){s.music=!s.music;$('musicBtn').textContent='Music: '+(s.music?'On 🎵':'Off 🔇');if(!s.music){if(s.timer){clearInterval(s.timer);s.timer=null;}if(s.musicLayer&&s.ctx){const layer=s.musicLayer;s.musicLayer=null;layer.gain.cancelScheduledValues(s.ctx.currentTime);layer.gain.setTargetAtTime(.0001,s.ctx.currentTime,.08);setTimeout(()=>{try{layer.disconnect();}catch(e){}},500);}if(s.musicBus&&s.ctx){s.musicBus.gain.cancelScheduledValues(s.ctx.currentTime);s.musicBus.gain.setTargetAtTime(.0001,s.ctx.currentTime,.08);}}else{startMusic();}save();}
function startMusic(){if(!s.music||s.timer)return;const ctx=ensureAudio();if(!ctx)return;const steps=[[196,293.66],[220,329.63],[246.94,369.99],[220,329.63],[174.61,261.63],[196,293.66],[220,349.23],[196,293.66]];let i=0;s.musicLayer=ctx.createGain();s.musicLayer.gain.value=1;s.musicLayer.connect(s.musicBus);const playStep=()=>{if(!s.music||!s.musicLayer)return;const when=ctx.currentTime+.03,pair=steps[i++%steps.length];if(s.musicBus){s.musicBus.gain.cancelScheduledValues(when);s.musicBus.gain.setTargetAtTime(.7,when,.35);}playTone(ctx,pair[0],when,1.9,'triangle',.0075,s.musicLayer);playTone(ctx,pair[0]*2,when+.11,1.25,'sine',.0028,s.musicLayer);playTone(ctx,pair[1],when+.48,.95,'sine',.0042,s.musicLayer);};playStep();s.timer=setInterval(()=>{if(ensureAudio())playStep();},1200);}
function init(){load();$('musicBtn').textContent='Music: '+(s.music?'On 🎵':'Off 🔇');$('startBtn').addEventListener('click',()=>{startMusic();startLevel(0);});$('musicBtn').addEventListener('click',toggleMusic);$('nextBtn').addEventListener('click',next);$('tabPlay').addEventListener('click',()=>s.sets.length?render():startLevel(0));$('tabLevels').addEventListener('click',levels);$('tabReview').addEventListener('click',review);}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
})();
</script>
</body>
