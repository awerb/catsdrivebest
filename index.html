<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Mila's DMV Adventure</title><style>body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(#67ccff,#ffb6ea);color:#4d176c}.wrap{max-width:430px;margin:auto;min-height:100vh;padding:20px}.card{background:white;border-radius:28px;padding:20px;box-shadow:0 8px 20px rgba(0,0,0,.15);margin-top:20px}h1{font-size:44px;line-height:.9;margin:0;text-align:center;color:white;text-shadow:0 4px #ff4fa3}.hero{background:linear-gradient(#59cfff,#ff73c8,#7b48ff);border-radius:32px;padding:24px;text-align:center}.cat{font-size:84px}button{width:100%;border:none;padding:18px;border-radius:22px;font-size:20px;font-weight:bold;margin-top:12px;cursor:pointer}.start{background:#ff4fa3;color:white}.answer{background:#fff0df}.correct{background:#9eff92!important}.wrong{background:#ffb2c8!important}.hidden{display:none}#question{font-size:28px;font-weight:bold}#progress{height:18px;background:#eee;border-radius:999px;overflow:hidden;margin:12px 0}#bar{height:100%;width:0%;background:linear-gradient(90deg,#ffe14d,#ff4fa3)}</style></head><body><div class='wrap'><div class='hero' id='home'><div class='cat'>🐱🚗</div><h1>MILA'S<br>DMV ADVENTURE</h1><button class='start' onclick='startGame()'>START ✨</button></div><div id='game' class='card hidden'><div id='level'></div><div id='progress'><div id='bar'></div></div><div id='question'></div><div id='answers'></div><div id='feedback'></div><button id='next' class='start hidden' onclick='nextQuestion()'>NEXT ➜</button></div></div><script>const sample=[["What does a red octagon sign mean?",["Yield","Stop","Warning","Railroad"],1,"A red octagon always means STOP."],["At a four-way stop, who goes first?",["Fastest","First vehicle to stop","Driver on left","Largest vehicle"],1,"The first vehicle to stop goes first."],["When driving in fog you should use:",["High beams","Low beams","Hazards","No lights"],1,"Low beams reduce glare."],["What is the legal BAC limit for drivers 21+?",["0.08%","0.10%","0.05%","0.15%"],0,"California's limit is 0.08%."],["If you miss your freeway exit you should:",["Reverse","Continue to next exit","Stop","U-turn"],1,"Never stop or reverse on a freeway."]];let questions=[];for(let i=0;i<20;i++){questions=questions.concat(sample);}questions=questions.slice(0,100);let current=0;let retry=null;function startGame(){document.getElementById('home').classList.add('hidden');document.getElementById('game').classList.remove('hidden');render();startMusic()}function render(){const q=retry||questions[current];document.getElementById('level').innerHTML='<b>Level '+(Math.floor(current/25)+1)+'</b> · Question '+((current%25)+1);document.getElementById('bar').style.width=((current/100)*100)+'%';document.getElementById('question').innerText=q[0];document.getElementById('answers').innerHTML='';document.getElementById('feedback').innerHTML='';document.getElementById('next').classList.add('hidden');q[1].forEach((a,i)=>{const b=document.createElement('button');b.className='answer';b.innerHTML='<b>'+String.fromCharCode(65+i)+'.</b> '+a;b.onclick=()=>pick(i,b,q);document.getElementById('answers').appendChild(b);})}function pick(i,btn,q){document.querySelectorAll('.answer').forEach(b=>b.disabled=true);if(i===q[2]){btn.classList.add('correct');document.getElementById('feedback').innerHTML='✨ '+q[3];retry=null}else{btn.classList.add('wrong');document.querySelectorAll('.answer')[q[2]].classList.add('correct');document.getElementById('feedback').innerHTML='❌ '+q[3]+'<br><br>You must answer this one again.';retry=q}document.getElementById('next').classList.remove('hidden')}function nextQuestion(){if(retry){render();return}current++;if(current>=questions.length){document.getElementById('game').innerHTML='<h1 style="color:#ff4fa3;text-shadow:none">🎓 YOU GRADUATED 🎉</h1><div style="font-size:80px;text-align:center">🐱🎺🐱</div>';return}render()}function startMusic(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const notes=[523,659,784,659];let i=0;setInterval(()=>{const o=ctx.createOscillator();const g=ctx.createGain();o.frequency.value=notes[i%notes.length];o.type='triangle';o.connect(g);g.connect(ctx.destination);g.gain.value=.02;o.start();o.stop(ctx.currentTime+.18);i++},350)}catch(e){}}</script></body></html>
